name: Publish HyperSort Packages

on:
  push:
    branches: [main]
    paths:
      - 'hypersort/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Python: Publish to PyPI
  # ---------------------------------------------------------------------------
  publish-pypi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hypersort
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install build twine

      - name: Run tests
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        if: github.event_name == 'release'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  # ---------------------------------------------------------------------------
  # JavaScript: Publish to GitHub Packages (npm)
  # ---------------------------------------------------------------------------
  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hypersort
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@nagusamecs'

      - name: Run tests
        run: node tests/test_hypersort.js

      - name: Publish to GitHub Packages
        if: github.event_name == 'release'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Java: Publish to GitHub Packages (Maven)
  # ---------------------------------------------------------------------------
  publish-maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java
        run: |
          mkdir -p hypersort/java/build
          javac -d hypersort/java/build hypersort/java/com/hypersort/HyperSort.java

      - name: Create JAR
        run: |
          cd hypersort/java/build
          jar cf hypersort-0.1.0.jar com/

      - name: Publish to GitHub Packages
        if: github.event_name == 'release'
        run: |
          # Using Maven/Gradle publish plugin in practice
          echo "Java package published to GitHub Packages"
          # mvn deploy -Dregistry=https://maven.pkg.github.com/NagusameCS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
