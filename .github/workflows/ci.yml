name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest on ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy safetensors
          pip install -e . || pip install .

      - name: Run pytest (ht_repro suite)
        run: pytest tests/unit_ht_repro -v --tb=short

      - name: Install hyperretro (numpy-only, no torch on CI baseline)
        run: pip install -e ./hyperretro || pip install ./hyperretro

      - name: Run pytest (hyperretro suite)
        env:
          HYPERRETRO_FORCE_FALLBACK: '1'
        run: pytest tests/unit_hyperretro -v --tb=short

      - name: Run commercial audit (non-blocking)
        continue-on-error: true
        run: python tests/audit_commercial.py
