function loadData() { buildUI(); }

function buildUI() {
  const pb = document.getElementById('phases');
  pb.innerHTML = '';
  FILES.forEach((f, i) => {
    if (!data[f]) return;
    const btn = document.createElement('button');
    btn.className = 'phase-btn';
    btn.textContent = PHASE_LABELS[i];
    btn.onclick = () => showPhase(i, btn);
    pb.appendChild(btn);
  });
  /* Auto-show first available phase */
  const first = pb.querySelector('.phase-btn');
  if (first) first.click();
  else document.getElementById('view').innerHTML = '<div id="loading">No manifold data found.</div>';
}

function showPhase(idx, btn) {
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const view = document.getElementById('view');
  view.innerHTML = '';
  switch(idx) {
    case 0: renderPhase1(view); break;
    case 1: renderPhase2(view); break;
    case 2: renderPhase3(view); break;
    case 3: renderPhase4(view); break;
    case 4: renderPhase5(view); break;
  }
}

/* ─── Helpers ─── */
function mkPanel(parent, title) {
  const p = document.createElement('div'); p.className = 'panel';
  const h = document.createElement('h2'); h.textContent = title;
  p.appendChild(h); parent.appendChild(p); return p;
}
function addStat(panel, label, value) {
  const d = document.createElement('div'); d.className = 'stat';
  d.innerHTML = `<span class="stat-label">${label}</span>`
    + `<span class="stat-value">${value}</span>`;
  panel.appendChild(d);
}
function mkCanvas(panel, w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  panel.appendChild(c); return c;
}

/* Color ramps */
function curvColor(v, lo, hi) {
  let t = (hi > lo) ? (v - lo) / (hi - lo) : 0.5;
  t = Math.max(0, Math.min(1, t));
  /* Blue (low R) → Cyan → Green → Yellow → Red (high R) */
  const r = Math.floor(255 * Math.min(1, 2*t));
  const g = Math.floor(255 * (t < 0.5 ? 2*t : 2*(1-t)));
  const b = Math.floor(255 * Math.min(1, 2*(1-t)));
  return `rgb(${r},${g},${b})`;
}
function simColor(v) {
  const t = Math.max(0, Math.min(1, v));
  return `rgb(${Math.floor(30+200*t)},${Math.floor(50+150*t)},${Math.floor(200-100*t)})`;
}

/* ─── Phase 1: PCA Cloud & Scree Plot ─── */
function renderPhase1(view) {
  const d = data['phase1_manifold.json']; if (!d) return;
  /* Stats */
  const sp = mkPanel(view, 'Manifold Identification');
  addStat(sp, 'Intrinsic Dimension (TwoNN)', d.intrinsic_dim);
  addStat(sp, 'PCA Components Kept', d.pca_components);
  addStat(sp, 'Explained Variance', (d.explained_ratio * 100).toFixed(2) + '%');
  addStat(sp, 'Total Variance', d.total_variance.toFixed(4));
  addStat(sp, 'Embedding Dim', d.embedding_dim);
  addStat(sp, 'Samples', d.n_samples);

  /* Scree plot */
  if (d.eigenvalues && d.eigenvalues.length > 0) {
    const cp = mkPanel(view, 'Scree Plot (PCA Eigenvalues)');
    const c = mkCanvas(cp, 600, 280);
    const ctx = c.getContext('2d');
    const ev = d.eigenvalues;
    const maxE = Math.max(...ev);
    const pad = 50;
    ctx.fillStyle = '#08080d'; ctx.fillRect(0,0,c.width,c.height);
    /* Axes */
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad, 10); ctx.lineTo(pad, c.height-pad);
    ctx.lineTo(c.width-10, c.height-pad); ctx.stroke();
    /* Bars */
    const bw = Math.max(2, (c.width - pad - 20) / ev.length - 1);
    for (let i = 0; i < ev.length; i++) {
      const h = (ev[i] / maxE) * (c.height - pad - 20);
      const x = pad + 5 + i * (bw + 1);
      ctx.fillStyle = i < d.intrinsic_dim ? '#5af' : '#334';
      ctx.fillRect(x, c.height - pad - h, bw, h);
    }
    /* Labels */
    ctx.fillStyle = '#778'; ctx.font = '10px monospace';
    ctx.fillText('Component', c.width/2-30, c.height-5);
    ctx.save(); ctx.translate(12, c.height/2); ctx.rotate(-Math.PI/2);
    ctx.fillText('Eigenvalue', 0, 0); ctx.restore();
    const lg = document.createElement('div'); lg.className = 'legend';
    lg.textContent = `Blue = within intrinsic dim (${d.intrinsic_dim}), Gray = beyond`;
    cp.appendChild(lg);
  }

  /* 2D/3D PCA cloud */
  if (d.cloud && d.cloud.length > 0) {
    const cp = mkPanel(view, 'Embedding Cloud (PCA Projection)');
    const c = mkCanvas(cp, 600, 500);
    drawCloud(c, d.cloud);
    const lg = document.createElement('div'); lg.className = 'legend';
    lg.textContent = `${d.cloud.length} samples in ${d.cloud[0].length}D PCA subspace`;
    cp.appendChild(lg);
  }
}

function drawCloud(canvas, pts) {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#08080d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  if (pts.length === 0) return;
  const nd = pts[0].length;
  /* Find bounds */
  let mins = new Array(nd).fill(Infinity), maxs = new Array(nd).fill(-Infinity);
  for (const p of pts) {
    for (let d = 0; d < nd; d++) { mins[d] = Math.min(mins[d], p[d]); maxs[d] = Math.max(maxs[d], p[d]); }
  }
  const pad = 40, w = canvas.width - 2*pad, h = canvas.height - 2*pad;
  function proj(p) {
    const x = (maxs[0] > mins[0]) ? (p[0]-mins[0])/(maxs[0]-mins[0]) : 0.5;
    const y = (nd > 1 && maxs[1] > mins[1]) ? (p[1]-mins[1])/(maxs[1]-mins[1]) : 0.5;
    return [pad + x*w, pad + (1-y)*h];
  }
  /* Grid */
  ctx.strokeStyle = '#181825'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const gy = pad + i*h/4; ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(pad+w, gy); ctx.stroke();
    const gx = pad + i*w/4; ctx.beginPath(); ctx.moveTo(gx, pad); ctx.lineTo(gx, pad+h); ctx.stroke();
  }
  /* Points */
  for (const p of pts) {
    const [x, y] = proj(p);
    let depth = nd > 2 ? (maxs[2] > mins[2] ? (p[2]-mins[2])/(maxs[2]-mins[2]) : 0.5) : 0.5;
    const alpha = 0.3 + 0.5 * depth;
    const size = 1.5 + 2 * depth;
    ctx.fillStyle = `rgba(100,180,255,${alpha})`;
    ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
  }
  /* Axis labels */
  ctx.fillStyle = '#556'; ctx.font = '11px monospace';
  ctx.fillText('PC1', canvas.width/2, canvas.height - 5);
  ctx.save(); ctx.translate(10, canvas.height/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('PC2', 0, 0); ctx.restore();
}

/* ─── Phase 2: Head Similarity Heatmap ─── */
function renderPhase2(view) {
  const d = data['phase2_symmetry.json']; if (!d) return;
  const sp = mkPanel(view, 'Symmetry Extraction');
  addStat(sp, 'Symmetry Score', d.symmetry_score.toFixed(4));
  addStat(sp, 'Generators Found', d.generators_found);
  addStat(sp, 'Head Similarity (mean)', d.head_similarity_mean.toFixed(4));
  addStat(sp, 'Head Similarity (max)', d.head_similarity_max.toFixed(4));
  addStat(sp, 'Total Heads', d.n_heads);

  if (d.similarity_matrix && d.similarity_matrix.length > 0) {
    const hp = mkPanel(view, 'Head Similarity Heatmap');
    const n = d.n_heads;
    const cellSize = Math.min(16, Math.floor(500 / n));
    const sz = cellSize * n + 60;
    const c = mkCanvas(hp, sz, sz);
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#08080d'; ctx.fillRect(0,0,sz,sz);
    const off = 40;
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        ctx.fillStyle = simColor(d.similarity_matrix[i][j]);
        ctx.fillRect(off + j*cellSize, off + i*cellSize, cellSize-1, cellSize-1);
      }
    }
    ctx.fillStyle = '#556'; ctx.font = '10px monospace';
    ctx.fillText('Head j →', sz/2-20, sz-5);
    ctx.save(); ctx.translate(8, sz/2); ctx.rotate(-Math.PI/2);
    ctx.fillText('Head i →', 0, 0); ctx.restore();
    const lg = document.createElement('div'); lg.className = 'legend';
    lg.textContent = `${n}x${n} cosine similarity, bright = high similarity`;
    hp.appendChild(lg);
  }
}

/* ─── Phase 3: Curvature Heatmap ─── */
function renderPhase3(view) {
  const d = data['phase3_curvature.json']; if (!d) return;
  const sp = mkPanel(view, 'Curvature Field');
  addStat(sp, 'Mean Scalar R', d.mean_scalar_curvature.toExponential(3));
  addStat(sp, 'Max Scalar R', d.max_scalar_curvature.toExponential(3));
  addStat(sp, 'Min Scalar R', d.min_scalar_curvature.toExponential(3));
  addStat(sp, 'Std Dev', d.curvature_std.toExponential(3));
  addStat(sp, 'High-Curvature Loci', d.high_curvature_loci);
  addStat(sp, 'Fisher Trace (mean)', d.fisher_trace_mean.toExponential(3));
  addStat(sp, 'Metric Field Points', d.metric_field_points);
  addStat(sp, 'Subspace Dim', d.dim);

  if (d.points && d.points.length > 0) {
    /* Curvature scatter plot */
    const cp = mkPanel(view, 'Scalar Curvature Map');
    const c = mkCanvas(cp, 600, 500);
    drawCurvatureMap(c, d.points);
    const lg = document.createElement('div'); lg.className = 'legend';
    lg.textContent = 'Blue = low R (flat), Red = high |R| (curved). Size = ||Γ|| (connection strength)';
    cp.appendChild(lg);

    /* Christoffel norm distribution */
    const np = mkPanel(view, 'Christoffel Norm Distribution');
    const c2 = mkCanvas(np, 600, 250);
    drawChristoffelHist(c2, d.points);
  }
}

function drawCurvatureMap(canvas, points) {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#08080d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  if (points.length === 0) return;
  let Rs = points.filter(p=>p.R!==undefined).map(p=>p.R);
  let absRs = Rs.map(Math.abs);
  const minR = Math.min(...Rs), maxR = Math.max(...Rs);
  const maxAbsR = Math.max(...absRs) || 1;
  let cNorms = points.filter(p=>p.christoffel_norm!==undefined).map(p=>p.christoffel_norm);
  const maxCN = cNorms.length > 0 ? Math.max(...cNorms) : 1;
  /* Bounds from position */
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  for (const p of points) {
    if (!p.pos) continue;
    minX = Math.min(minX, p.pos[0]); maxX = Math.max(maxX, p.pos[0]);
    if (p.pos.length > 1) { minY = Math.min(minY, p.pos[1]); maxY = Math.max(maxY, p.pos[1]); }
  }
  const pad = 50, w = canvas.width - 2*pad, h = canvas.height - 2*pad;
  for (const p of points) {
    if (!p.pos) continue;
    const x = pad + (maxX>minX ? (p.pos[0]-minX)/(maxX-minX) : 0.5) * w;
    const y = pad + (1 - (maxY>minY && p.pos.length>1 ? (p.pos[1]-minY)/(maxY-minY) : 0.5)) * h;
    const R = p.R || 0;
    const cn = p.christoffel_norm || 0;
    const size = 3 + 8 * (maxCN > 0 ? cn / maxCN : 0);
    ctx.fillStyle = curvColor(Math.abs(R), 0, maxAbsR);
    ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#556'; ctx.font = '11px monospace';
  ctx.fillText('PC1', canvas.width/2, canvas.height - 5);
  ctx.save(); ctx.translate(10, canvas.height/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('PC2', 0, 0); ctx.restore();
}

function drawChristoffelHist(canvas, points) {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#08080d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  let cns = points.filter(p=>p.christoffel_norm!==undefined).map(p=>p.christoffel_norm).sort((a,b)=>a-b);
  if (cns.length === 0) return;
  const nbins = 30;
  const lo = cns[0], hi = cns[cns.length-1];
  const binW = (hi - lo) / nbins || 1;
  let bins = new Array(nbins).fill(0);
  for (const v of cns) { const b = Math.min(nbins-1, Math.floor((v-lo)/binW)); bins[b]++; }
  const maxBin = Math.max(...bins);
  const pad = 50, w = canvas.width - pad - 20, h2 = canvas.height - pad - 20;
  const bw = w / nbins;
  ctx.strokeStyle = '#333'; ctx.beginPath(); ctx.moveTo(pad, 10); ctx.lineTo(pad, canvas.height-pad);
  ctx.lineTo(canvas.width-10, canvas.height-pad); ctx.stroke();
  for (let i = 0; i < nbins; i++) {
    const bh = maxBin > 0 ? (bins[i]/maxBin)*h2 : 0;
    ctx.fillStyle = '#5a8';
    ctx.fillRect(pad + i*bw, canvas.height-pad-bh, bw-1, bh);
  }
  ctx.fillStyle = '#556'; ctx.font = '10px monospace';
  ctx.fillText('||Γ||_F', canvas.width/2-15, canvas.height-5);
}

/* ─── Phase 4: Axiom Summary ─── */
function renderPhase4(view) {
  const d = data['phase4_axioms.json']; if (!d) return;
  const sp = mkPanel(view, 'Axiom Formalization');
  addStat(sp, 'Unique Axioms', d.axiom_count);
  addStat(sp, 'Consistency Score', d.consistency_score.toFixed(4));
  addStat(sp, 'Candidates Tested', d.candidates_tested);
  addStat(sp, 'Candidates Accepted', d.candidates_accepted);
  addStat(sp, 'Oracle Calls', d.oracle_calls_used);
  addStat(sp, 'Information Gain', d.information_gain.toFixed(4));

  /* Simple bar chart: accepted vs tested */
  const cp = mkPanel(view, 'Axiom Discovery Funnel');
  const c = mkCanvas(cp, 400, 200);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#08080d'; ctx.fillRect(0,0,c.width,c.height);
  const bars = [
    { label: 'Tested', val: d.candidates_tested, color: '#335' },
    { label: 'Accepted', val: d.candidates_accepted, color: '#358' },
    { label: 'Unique', val: d.axiom_count, color: '#5af' }
  ];
  const maxV = Math.max(...bars.map(b=>b.val)) || 1;
  const bw = 80, gap = 30, startX = 60;
  bars.forEach((b, i) => {
    const h = (b.val / maxV) * 140;
    const x = startX + i * (bw + gap);
    ctx.fillStyle = b.color;
    ctx.fillRect(x, 170 - h, bw, h);
    ctx.fillStyle = '#aaf'; ctx.font = '11px monospace';
    ctx.fillText(b.val.toString(), x + bw/2 - 8, 165 - h);
    ctx.fillStyle = '#778';
    ctx.fillText(b.label, x + 5, 190);
  });
}

/* ─── Phase 5: Geodesic Trajectories ─── */
function renderPhase5(view) {
  const d = data['phase5_geodesic.json']; if (!d) return;
  const sp = mkPanel(view, 'Geodesic Pilot');
  addStat(sp, 'Cosine Similarity', d.cosine_similarity.toFixed(4));
  addStat(sp, 'Reconstruction Error (L2)', d.reconstruction_error.toFixed(4));
  addStat(sp, 'Path Length', d.path_length.toFixed(4));
  addStat(sp, 'Top-1 Match Rate', (d.top1_match_rate*100).toFixed(1) + '%');
  addStat(sp, 'Target MRR', d.target_mrr.toFixed(4));
  addStat(sp, 'Projected Speedup', d.projected_speedup.toFixed(1) + 'x');
  addStat(sp, 'Converged', d.converged ? 'Yes' : 'No');

  if (d.trajectories && d.trajectories.length > 0) {
    const tp = mkPanel(view, 'Geodesic Trajectories (PCA Subspace)');
    const c = mkCanvas(tp, 600, 500);
    drawTrajectories(c, d.trajectories);
    const lg = document.createElement('div'); lg.className = 'legend';
    lg.textContent = `${d.trajectories.length} geodesic paths. ○ = start, × = target, ● = endpoint. `
      + 'Green = high cos_sim, Red = low.';
    tp.appendChild(lg);
  }
}

function drawTrajectories(canvas, trajs) {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#08080d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  /* Gather all points for bounds */
  let allX = [], allY = [];
  for (const t of trajs) {
    if (!t.path) continue;
    for (const p of t.path) { allX.push(p[0]); if (p.length > 1) allY.push(p[1]); }
    if (t.target) { allX.push(t.target[0]); if (t.target.length > 1) allY.push(t.target[1]); }
  }
  if (allX.length === 0) return;
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const minY = allY.length > 0 ? Math.min(...allY) : 0;
  const maxY = allY.length > 0 ? Math.max(...allY) : 1;
  const pad = 50, w = canvas.width - 2*pad, h = canvas.height - 2*pad;
  function proj(p) {
    const x = pad + (maxX>minX ? (p[0]-minX)/(maxX-minX) : 0.5) * w;
    const y = pad + (1 - (maxY>minY && p.length>1 ? (p[1]-minY)/(maxY-minY) : 0.5)) * h;
    return [x, y];
  }
  /* Grid */
  ctx.strokeStyle = '#181825'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const gy = pad + i*h/4; ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(pad+w, gy); ctx.stroke();
    const gx = pad + i*w/4; ctx.beginPath(); ctx.moveTo(gx, pad); ctx.lineTo(gx, pad+h); ctx.stroke();
  }
  /* Draw each trajectory */
  for (const t of trajs) {
    if (!t.path || t.path.length < 2) continue;
    const cs = t.cos_sim || 0;
    const r = Math.floor(255 * (1 - Math.max(0, cs)));
    const g = Math.floor(255 * Math.max(0, cs));
    const col = `rgb(${r},${g},80)`;
    /* Path line */
    ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.7;
    ctx.beginPath();
    const [sx, sy] = proj(t.path[0]); ctx.moveTo(sx, sy);
    for (let i = 1; i < t.path.length; i++) {
      const [px, py] = proj(t.path[i]); ctx.lineTo(px, py);
    }
    ctx.stroke(); ctx.globalAlpha = 1;
    /* Start marker (circle) */
    ctx.fillStyle = '#fff'; ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    /* Endpoint marker (filled dot) */
    const lastPt = t.path[t.path.length - 1];
    const [ex, ey] = proj(lastPt);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI*2); ctx.fill();
    /* Target marker (cross) */
    if (t.target) {
      const [tx, ty] = proj(t.target);
      ctx.strokeStyle = '#fa0'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(tx-5,ty-5); ctx.lineTo(tx+5,ty+5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(tx+5,ty-5); ctx.lineTo(tx-5,ty+5); ctx.stroke();
    }
  }
  ctx.fillStyle = '#556'; ctx.font = '11px monospace';
  ctx.fillText('PC1', canvas.width/2, canvas.height - 5);
  ctx.save(); ctx.translate(10, canvas.height/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('PC2', 0, 0); ctx.restore();
}
