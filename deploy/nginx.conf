# nginx reverse proxy for ht-repro.
# Place under /etc/nginx/sites-available/ht-repro and symlink to sites-enabled.

limit_req_zone $binary_remote_addr zone=ht_repro_api:10m rate=10r/s;

upstream ht_repro_upstream {
    server 127.0.0.1:8765;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # --- TLS (uncomment and point at a real cert) -------------------------
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;

    # SSE needs no buffering and long timeouts
    location /api/stream {
        proxy_pass http://ht_repro_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 24h;
    }

    location /api/v1/ {
        limit_req zone=ht_repro_api burst=20 nodelay;
        proxy_pass http://ht_repro_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://ht_repro_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
